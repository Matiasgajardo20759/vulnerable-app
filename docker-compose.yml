version: '3'
services:
  app:
    image: python:3.9
    container_name: vulnerable-app
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
    working_dir: /app
    command: bash -c "pip install flask flask-wtf bcrypt && python vulnerable_app.py"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"